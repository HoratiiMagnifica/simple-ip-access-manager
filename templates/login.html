<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Access Manager - Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .login-container{background:white;padding:40px;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,0.1);width:100%;max-width:400px;}
        h1{color:#333;margin-bottom:30px;text-align:center;}
        .form-group{margin-bottom:20px;}
        label{display:block;margin-bottom:5px;color:#666;font-size:14px;}
        input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:5px;font-size:14px;transition:border-color 0.3s;}
        input:focus{outline:none;border-color:#667eea;}
        button{width:100%;background:#667eea;color:white;border:none;padding:12px;border-radius:5px;font-size:16px;font-weight:600;cursor:pointer;transition:background 0.3s;}
        button:hover{background:#5a67d8;}
        .alert{padding:12px;border-radius:5px;margin-bottom:20px;display:none;}
        .alert-error{background:#fed7d7;color:#742a2a;border:1px solid #feb2b2;}
    </style>
</head>
<body>
    <div class="login-container">
        <h1>IP Access Manager</h1>
        <div id="alert" class="alert alert-error"></div>
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="admin" readonly>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            
            try {
                const response = await fetch('/login', {method: 'POST', body: formData});
                if (response.redirected) window.location.href = response.url;
                else {
                    document.getElementById('alert').style.display = 'block';
                    document.getElementById('alert').textContent = 'Invalid password';
                }
            } catch (error) {
                document.getElementById('alert').style.display = 'block';
                document.getElementById('alert').textContent = 'Connection error';
            }
        }
    </script>
</body>
</html>
